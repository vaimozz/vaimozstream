<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Penerima Bantuan Alat Pertanian</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #dde3ee;
      --text: #1f2937;
      --muted: #6b7280;
      --ok: #0f766e;
      --warn: #b45309;
      --wait: #1d4ed8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      font-size: 24px;
      font-weight: 700;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, select, button {
      width: 100%;
      min-height: 36px;
      border: 1px solid #cfd6e4;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
    }

    button {
      width: auto;
      padding: 8px 14px;
      background: #111827;
      color: #fff;
      border: 0;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    th {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    tr:last-child td { border-bottom: 0; }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag.salur { color: #065f46; background: #d1fae5; }
    .tag.proses { color: #1e40af; background: #dbeafe; }
    .tag.tunda { color: #92400e; background: #fef3c7; }

    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      button { width: 100%; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 760px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dashboard Penerima Bantuan Alat Pertanian</h1>
    <p class="sub">Monitoring bantuan alat pertanian berdasarkan kecamatan, desa, dan kelompok tani.</p>

    <section class="stats">
      <div class="card">
        <div class="label">Total Penerima</div>
        <div class="value" id="totalPenerima">0</div>
      </div>
      <div class="card">
        <div class="label">Sudah Disalurkan</div>
        <div class="value" id="totalSalur">0</div>
      </div>
      <div class="card">
        <div class="label">Dalam Proses</div>
        <div class="value" id="totalProses">0</div>
      </div>
      <div class="card">
        <div class="label">Ditunda</div>
        <div class="value" id="totalTunda">0</div>
      </div>
    </section>

    <section class="toolbar">
      <input id="q" type="text" placeholder="Cari kecamatan / desa / poktan / ketua / NIK">
      <select id="filterDesa">
        <option value="">Semua Desa</option>
      </select>
      <select id="filterStatus">
        <option value="">Semua Status</option>
        <option value="Diproses">Diproses</option>
      </select>
      <button id="resetBtn" type="button">Reset Filter</button>
    </section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Kecamatan</th>
            <th>Desa</th>
            <th>Poktan</th>
            <th>Ketua</th>
            <th>NIK</th>
            <th>Jenis Alat</th>
            <th>Jumlah</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const data = [
      { kecamatan: "Sukorame", desa: "Sewor", poktan: "Gapoktan Sekar Arum Rempah", ketua: "Trisno Budi Utomo", nik: "3524011810720001", alat: "Combine Harvester", jumlah: "1 Unit", status: "Diproses" },
      { kecamatan: "Sukorame", desa: "Wedoro", poktan: "Gapoktan Wedoro Sukorame", ketua: "Sarjo", nik: "3524010812710001", alat: "Combine Harvester", jumlah: "1 Unit", status: "Diproses" },
      { kecamatan: "Ngimbang", desa: "Mendugo", poktan: "Gapoktan Tani Jaya", ketua: "Mustain", nik: "3524041204690003", alat: "Combine Harvester", jumlah: "1 Unit", status: "Diproses" },
      { kecamatan: "Bluluk", desa: "Primpen", poktan: "Gapoktan Dewi Sri", ketua: "Tauhit", nik: "3524021505740001", alat: "Combine Harvester", jumlah: "1 Unit", status: "Diproses" }
    ];

    const rowsEl = document.getElementById("rows");
    const qEl = document.getElementById("q");
    const desaEl = document.getElementById("filterDesa");
    const statusEl = document.getElementById("filterStatus");
    const resetEl = document.getElementById("resetBtn");

    function tagClass(status) {
      if (status === "Diproses") return "proses";
      return "tunda";
    }

    function renderStats(items) {
      document.getElementById("totalPenerima").textContent = items.length;
      document.getElementById("totalSalur").textContent = items.filter(i => i.status === "Disalurkan").length;
      document.getElementById("totalProses").textContent = items.filter(i => i.status === "Diproses").length;
      document.getElementById("totalTunda").textContent = items.filter(i => i.status === "Ditunda").length;
    }

    function renderRows(items) {
      rowsEl.innerHTML = "";
      items.forEach((item, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${item.kecamatan}</td>
          <td>${item.desa}</td>
          <td>${item.poktan}</td>
          <td>${item.ketua}</td>
          <td>${item.nik}</td>
          <td>${item.alat}</td>
          <td>${item.jumlah}</td>
          <td><span class="tag ${tagClass(item.status)}">${item.status}</span></td>
        `;
        rowsEl.appendChild(tr);
      });
    }

    function applyFilters() {
      const q = qEl.value.trim().toLowerCase();
      const desa = desaEl.value;
      const status = statusEl.value;

      const filtered = data.filter(item => {
        const matchQ =
          item.kecamatan.toLowerCase().includes(q) ||
          item.desa.toLowerCase().includes(q) ||
          item.poktan.toLowerCase().includes(q) ||
          item.ketua.toLowerCase().includes(q) ||
          item.nik.toLowerCase().includes(q) ||
          item.alat.toLowerCase().includes(q);
        const matchDesa = !desa || item.desa === desa;
        const matchStatus = !status || item.status === status;
        return matchQ && matchDesa && matchStatus;
      });

      renderRows(filtered);
      renderStats(filtered);
    }

    function initDesaOptions() {
      const desas = [...new Set(data.map(i => i.desa))];
      desas.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        desaEl.appendChild(opt);
      });
    }

    qEl.addEventListener("input", applyFilters);
    desaEl.addEventListener("change", applyFilters);
    statusEl.addEventListener("change", applyFilters);
    resetEl.addEventListener("click", () => {
      qEl.value = "";
      desaEl.value = "";
      statusEl.value = "";
      applyFilters();
    });

    initDesaOptions();
    applyFilters();
  </script>
</body>
</html>
